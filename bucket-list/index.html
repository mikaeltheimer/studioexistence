<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bucket List</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* =============================================
     DESIGN SYSTEM — Bucket List
     Fond blanc global, blocs colorés par catégorie
     Modifier CAT_COLORS dans le JS pour la palette
     ============================================= */
  :root {
    --bg:          #FFFFFF;
    --bg-nav:      #F8F8F8;
    --surface:     #FFFFFF;
    --border:      rgba(0,0,0,0.09);
    --border2:     rgba(0,0,0,0.15);
    --text:        #111111;
    --text-muted:  rgba(17,17,17,0.55);
    --text-dim:    rgba(17,17,17,0.28);
    --font-display:'DM Serif Display', serif;
    --font-body:   'Plus Jakarta Sans', sans-serif;
    --shadow:      0 2px 8px rgba(0,0,0,0.10);
    --shadow-md:   0 4px 20px rgba(0,0,0,0.14);
    /* Per-category (set inline) */
    --cat-bg:  #2ECC71;
    --cat-h:   #27AE60;
    --cat-r:   46,204,113;
    --cat-text:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;overflow-x:hidden;}

  /* ── HEADER ── */
  /* ── HERO BANNER ── */
  #hero-banner{
    background: linear-gradient(105deg, #FF6B35 0%, #E91E8C 55%, #9B59B6 100%);
    padding: 14px 44px 12px;
    position: relative;
    z-index: 101;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    border-bottom: none;
  }
  .hero-left{ display:flex;flex-direction:column;gap:4px; }
  .hero-title{
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 400;
    letter-spacing: -0.5px;
    line-height: 1;
    color: #fff;
  }
  .hero-title em{ font-style:italic; opacity:0.85; }
  .hero-subtitle{
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    font-style: italic;
    letter-spacing: 0.2px;
  }
  .hero-right{
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hero-scroll-hint{
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* ── SITE HEADER (fixed, sits below hero in flow) ── */
  #site-header{
    padding:8px 44px 0;
    border-bottom:none;
    position:fixed;left:0;right:0;
    background:rgba(255,255,255,0.97);
    backdrop-filter:blur(16px);
    z-index:100;
    top:0;
  }
  .header-row{
    display:flex;align-items:center;gap:12px;
    padding-bottom:8px;
    flex-wrap:wrap;
  }
  .progress-separator{ width:100%; }
  .progress-separator .progress-track{
    height:2px;
    border-radius:0;
    background:#EBEBEB;
  }
  .header-top{display:flex;align-items:center;justify-content:space-between;}
  h1{font-family:var(--font-display);font-size:32px;font-weight:400;letter-spacing:-0.3px;line-height:1;color:var(--text);}
  h1 em{font-style:italic;}
  .header-right{display:flex;gap:8px;align-items:center;}
  .lang-toggle{display:flex;gap:5px;}
  .lang-btn{background:none;border:1.5px solid var(--border2);color:var(--text-muted);padding:3px 10px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:600;letter-spacing:0.5px;transition:all 0.2s;}
  .lang-btn-hero{background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.75);padding:3px 10px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:0.5px;transition:all 0.2s;}
  .lang-btn-hero.active{background:rgba(255,255,255,0.9);border-color:transparent;color:#111;}
  .lang-btn.active{border-color:var(--text);color:var(--text);background:#F0F0F0;}

  /* ── STATS ── */
  .stats-bar{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
  .stat{display:flex;flex-direction:column;gap:1px;}
  .stat-value{font-family:var(--font-display);font-size:26px;line-height:1;color:var(--text);}
  .stat-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;font-weight:600;}
  .stat-divider{width:1px;height:26px;background:var(--border2);}
  .progress-wrap{flex:1;min-width:160px;}
  .progress-track{height:4px;background:#EBEBEB;border-radius:2px;overflow:hidden;position:relative;}
  .progress-fill-done{position:absolute;left:0;top:0;height:100%;background:#111;transition:width 0.4s;}
  .progress-fill-todo{position:absolute;top:0;height:100%;background:#BBBBBB;transition:all 0.4s;}
  .progress-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--text-muted);font-weight:600;}

  /* ── CONTROLS ── */
  /* site-controls merged into site-header */
  .search-wrap{position:relative;flex:1;min-width:150px;max-width:320px;}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;}
  input[type="text"]{width:100%;background:#F5F5F5;border:1.5px solid transparent;border-radius:8px;padding:7px 10px 7px 30px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:all 0.2s;font-weight:500;}
  input[type="text"]:focus{background:#fff;border-color:var(--border2);}
  input[type="text"]::placeholder{color:var(--text-dim);}
  .filter-btns{display:flex;gap:5px;flex-wrap:wrap;}
  .filter-btn{background:none;border:1.5px solid var(--border2);color:var(--text-muted);padding:5px 12px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-size:12px;font-weight:600;transition:all 0.2s;white-space:nowrap;}
  .filter-btn:hover{border-color:var(--text);color:var(--text);}
  .filter-btn.active-done,.filter-btn.active-todo,.filter-btn.active-all{border-color:var(--text);color:var(--text);background:#F0F0F0;}
  .results-btn{margin-left:auto;background:var(--text);color:#fff;border:none;padding:8px 18px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:700;transition:opacity 0.2s;white-space:nowrap;letter-spacing:0.2px;}
  .results-btn:hover{opacity:0.8;}

  /* ── MAIN LAYOUT ── */
  #main-layout{display:flex;position:fixed;left:0;right:0;bottom:0;}

  /* ── NAV ── */
  .cat-nav{width:196px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;background:var(--bg-nav);}
  .cat-nav-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 16px;cursor:pointer;transition:all 0.15s;
    font-size:12.5px;font-weight:600;color:var(--text-muted);
    border-left:3px solid transparent;
    border-radius:0 6px 6px 0;
    margin-right:8px;
  }
  .cat-nav-item:hover{color:var(--text);background:#F0F0F0;}
  .cat-nav-item.active{color:var(--text);border-left-color:var(--cat-bg);background:#F0F0F0;}
  .cat-nav-dot{width:9px;height:9px;border-radius:50%;background:var(--cat-bg);flex-shrink:0;box-shadow:0 0 6px rgba(var(--cat-r),0.5);}
  .cat-count{font-size:10px;color:var(--text-dim);margin-left:auto;font-weight:700;}

  /* ── CONTENT ── */
  .content{flex:1;overflow-y:auto;padding:0;}

  /* ── CATEGORY SECTION ── */
  .category-section{position:relative;}

  /* ── STICKY CAT HEADER ── */
  .cat-sticky{
    position:sticky;top:0;z-index:10;
    background:var(--cat-bg);
    padding:18px 44px 14px;
    display:flex;align-items:center;gap:20px;
  }
  .cat-title{
    font-family:var(--font-display);
    font-size:30px;font-weight:400;
    letter-spacing:-0.3px;
    color:var(--cat-text);
    line-height:1;
    flex-shrink:0;
  }
  .cat-progress-wrap{flex:1;max-width:260px;}
  .cat-progress-track{height:5px;background:rgba(255,255,255,0.25);border-radius:3px;overflow:hidden;}
  .cat-progress-fill{height:100%;background:rgba(255,255,255,0.9);border-radius:3px;transition:width 0.4s;}
  .cat-progress-label{font-size:11px;color:rgba(255,255,255,0.75);margin-top:4px;font-weight:700;letter-spacing:0.3px;}

  /* ── CAT BODY ── */
  .cat-body{
    background:color-mix(in srgb, var(--cat-bg) 8%, white);
    padding:24px 44px 36px;
  }

  /* ── SUBCATEGORY ── */
  .subcat{margin-bottom:26px;}
  .subcat-title{
    font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--cat-h);font-weight:800;
    margin-bottom:10px;padding-bottom:7px;
    border-bottom:2px solid var(--cat-bg);
    display:inline-block;
  }

  /* ── ITEMS GRID ── */
  .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:7px;}

  /* ── ITEM default ── */
  .item{
    background:#fff;
    border:1.5px solid rgba(var(--cat-r),0.20);
    border-radius:10px;
    padding:10px 13px;
    display:flex;align-items:center;gap:9px;
    transition:all 0.18s;
    box-shadow:0 1px 3px rgba(var(--cat-r),0.06);
  }
  .item:hover{
    border-color:rgba(var(--cat-r),0.5);
    box-shadow:0 3px 12px rgba(var(--cat-r),0.15);
    transform:translateY(-1px);
  }
  .item.hidden{display:none;}
  .item-label{flex:1;font-size:13px;line-height:1.4;color:#444;font-weight:500;}
  .item:hover .item-label{color:var(--text);}

  /* ── ITEM accompli (plein) ── */
  .item.is-done{
    background:var(--cat-bg);
    border-color:var(--cat-bg);
    box-shadow:0 3px 14px rgba(var(--cat-r),0.35);
    transform:none;
  }
  .item.is-done .item-label{color:var(--cat-text);font-weight:700;}

  /* ── ITEM à faire (contour) ── */
  .item.is-todo{
    background:#fff;
    border-color:var(--cat-bg);
    border-width:2px;
    box-shadow:0 2px 8px rgba(var(--cat-r),0.12);
  }
  .item.is-todo .item-label{color:var(--cat-h);font-weight:600;}

  /* ── CHECK BUTTONS ── */
  .item-actions{display:flex;gap:4px;flex-shrink:0;}
  .check-btn{
    width:28px;height:28px;border-radius:6px;
    border:1.5px solid rgba(var(--cat-r),0.25);
    background:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;transition:all 0.15s;
    color:rgba(var(--cat-r),0.5);
    font-weight:700;
  }
  .check-btn:hover{border-color:var(--cat-bg);color:var(--cat-bg);}
  .check-btn.done-btn.active{
    background:rgba(255,255,255,0.25);
    border-color:rgba(255,255,255,0.6);
    color:var(--cat-text);
  }
  .check-btn.todo-btn.active{
    background:var(--cat-bg);
    border-color:var(--cat-bg);
    color:var(--cat-text);
  }
  .del-btn{color:var(--text-dim);font-size:9px;font-weight:700;}
  .del-btn:hover{color:#e53e3e;border-color:#e53e3e;}

  /* ── FREETEXT ── */
  .freetext-row{
    border:1.5px dashed rgba(var(--cat-r),0.3);
    border-radius:10px;padding:8px 13px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    margin-bottom:7px;background:#fff;
  }
  .freetext-prefix{font-size:13px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;font-weight:600;}
  .freetext-input{flex:1;min-width:80px;background:none;border:none;border-bottom:1.5px solid rgba(var(--cat-r),0.3);padding:1px 4px;font-size:13px;color:var(--text);outline:none;font-family:var(--font-body);font-weight:500;}
  .freetext-input:focus{border-bottom-color:var(--cat-bg);}
  .freetext-add{background:var(--cat-bg);border:none;color:var(--cat-text);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:var(--font-body);font-weight:700;transition:all 0.15s;white-space:nowrap;}
  .freetext-add:hover{opacity:0.85;}
  .dynamic-items{display:flex;flex-direction:column;gap:5px;margin-bottom:6px;}

  /* ── SAVE NOTICE ── */
  #save-notice{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:6px;font-size:11px;color:var(--text-dim);letter-spacing:0.5px;border-top:1px solid var(--border);background:var(--bg);z-index:50;font-weight:600;}

  /* ── RESULTS ── */
  #results-panel{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.99);z-index:200;overflow-y:auto;padding:48px 56px;}
  #results-panel.open{display:block;}
  .results-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;}
  .results-title{font-family:var(--font-display);font-size:38px;font-weight:400;color:var(--text);}
  .results-title em{font-style:italic;}
  .results-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .close-btn,.save-url-btn{background:none;border:1.5px solid var(--border2);color:var(--text-muted);padding:7px 14px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:600;transition:all 0.2s;}
  .close-btn:hover,.save-url-btn:hover{border-color:var(--text);color:var(--text);}
  .poster-btn-main{background:var(--text);color:#fff;border:none;padding:8px 18px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:700;transition:opacity 0.2s;}
  .poster-btn-main:hover{opacity:0.8;}
  .results-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:28px;}
  .r-stat{background:#F5F5F5;border:1.5px solid var(--border2);border-radius:12px;padding:14px 18px;}
  .r-stat-n{font-family:var(--font-display);font-size:38px;line-height:1;margin-bottom:3px;color:var(--text);}
  .r-stat-d{font-size:11px;color:var(--text-muted);font-weight:700;letter-spacing:0.5px;}
  .results-lists{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px;}
  .res-col-title{font-family:var(--font-display);font-size:22px;font-weight:400;margin-bottom:12px;color:var(--text);}
  .res-cat-block{margin-bottom:8px;border:1.5px solid var(--border2);border-radius:10px;overflow:hidden;background:#F9F9F9;}
  .res-cat-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;cursor:pointer;transition:background 0.15s;user-select:none;}
  .res-cat-toggle:hover{background:#F0F0F0;}
  .res-cat-name{font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:var(--text-muted);}
  .res-cat-arrow{font-size:9px;color:var(--text-dim);transition:transform 0.2s;font-weight:700;}
  .res-cat-block.open .res-cat-arrow{transform:rotate(180deg);}
  .res-cat-items{display:none;padding:4px 13px 10px;}
  .res-cat-block.open .res-cat-items{display:block;}
  .res-item{font-size:12.5px;color:var(--text-muted);padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;font-weight:500;}
  .res-item:last-child{border-bottom:none;}
  .res-item::before{content:'';width:4px;height:4px;border-radius:50%;flex-shrink:0;background:var(--border2);}

  /* ── POSTER ── */
  #poster-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;overflow-y:auto;padding:36px;align-items:flex-start;justify-content:center;}
  #poster-panel.open{display:flex;}
  .poster-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;}
  .poster-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .p-btn{background:none;border:1.5px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);padding:7px 14px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:600;transition:all 0.2s;}
  .p-btn:hover{border-color:#fff;color:#fff;}
  .p-btn.primary{background:#fff;border-color:#fff;color:#111;font-weight:700;}
  .p-btn.primary:hover{opacity:0.85;}
  #poster-canvas{max-width:min(100%,580px);border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,0.7);}

  /* ── ADMIN ── */
  #admin-panel{display:none;position:fixed;inset:0;background:var(--bg);z-index:400;overflow-y:auto;padding:40px 50px;}
  #admin-panel.open{display:block;}
  .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:16px;border-bottom:1.5px solid var(--border2);}
  .admin-title{font-family:var(--font-display);font-size:30px;font-weight:400;color:var(--text);}
  .admin-title em{font-style:italic;}
  .admin-body{display:grid;grid-template-columns:220px 1fr;gap:24px;}
  .admin-nav{border-right:1px solid var(--border);padding-right:18px;}
  .admin-nav-item{padding:8px 11px;cursor:pointer;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-muted);transition:all 0.15s;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
  .admin-nav-item:hover{background:#F5F5F5;color:var(--text);}
  .admin-nav-item.active{background:#F0F0F0;color:var(--text);}
  .admin-nav-count{font-size:11px;opacity:0.5;font-weight:700;}
  .admin-content-area{min-height:500px;}
  .admin-cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .admin-cat-title{font-family:var(--font-display);font-size:22px;font-weight:400;color:var(--text);}
  .admin-subcat{margin-bottom:26px;}
  .admin-subcat-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);font-weight:700;}
  .admin-item-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;background:#F9F9F9;margin-bottom:4px;}
  .admin-item-row:hover{border-color:var(--border2);background:#F5F5F5;}
  .admin-item-text{flex:1;font-size:13px;color:var(--text);font-weight:500;}
  .admin-item-freetext{font-size:11px;color:var(--text-muted);font-style:italic;}
  .admin-del-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:all 0.15s;font-weight:700;}
  .admin-del-btn:hover{background:rgba(229,62,62,0.1);color:#e53e3e;}
  .admin-add-row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;}
  .admin-add-input{flex:1;min-width:160px;background:#F5F5F5;border:1.5px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);font-family:var(--font-body);outline:none;font-weight:500;}
  .admin-add-input:focus{background:#fff;border-color:var(--text);}
  .admin-add-btn{background:var(--text);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:700;white-space:nowrap;transition:opacity 0.2s;}
  .admin-add-btn:hover{opacity:0.8;}
  .admin-save-notice{display:inline-block;font-size:12px;color:#22c55e;margin-left:8px;opacity:0;transition:opacity 0.3s;font-weight:700;}
  .admin-save-notice.show{opacity:1;}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2px;}
</style>
</head>
<body>

<div id="hero-banner">
  <div class="hero-left">
    <div class="hero-title">Bucket <em>List</em></div>
    <div class="hero-subtitle">Pour une vie qui vaut la peine d'être vécue</div>
  </div>
  <div class="hero-right">
    <div class="lang-toggle">
      <button class="lang-btn-hero" onclick="setLang('fr')" id="lang-fr-hero">FR</button>
      <button class="lang-btn-hero" onclick="setLang('en')" id="lang-en-hero">EN</button>
    </div>
    <!-- admin accessible via ?admin -->
  </div>
</div>

<header id="site-header">
  <div class="header-row">
    <div class="stat"><span class="stat-value done" id="stat-done">0</span><span class="stat-label">Accomplis</span></div>
    <div class="stat-divider"></div>
    <div class="stat"><span class="stat-value todo" id="stat-todo">0</span><span class="stat-label">Sur ma liste</span></div>
    <div class="stat-divider"></div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="Rechercher..." oninput="renderContent()">
    </div>
    <div class="filter-btns">

function loadState(){
  try{state=JSON.parse(localStorage.getItem('bl-state')||'{}');}catch(e){state={};}
  try{dynamicItems=JSON.parse(localStorage.getItem('bl-dynamic')||'{}');}catch(e){dynamicItems={};}
  // Load custom categories from admin edits
  try{const saved=localStorage.getItem('bl-categories');if(saved)categories=JSON.parse(saved);}catch(e){}
}
function saveState(){
  localStorage.setItem('bl-state',JSON.stringify(state));
  localStorage.setItem('bl-dynamic',JSON.stringify(dynamicItems));
}
function saveCategories(){
  localStorage.setItem('bl-categories',JSON.stringify(categories));
  const notice=document.getElementById('admin-save-notice');
  notice.classList.add('show');
  setTimeout(()=>notice.classList.remove('show'),2000);
}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  document.querySelectorAll('.lang-btn-hero').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  document.getElementById('search-input').placeholder=t('search_p');
  // Sync hero lang buttons
  const hfr=document.getElementById('lang-fr-hero');
  const hen=document.getElementById('lang-en-hero');
  if(hfr) hfr.classList.toggle('active', l==='fr');
  if(hen) hen.classList.toggle('active', l==='en');
  renderContent();updateStats();
}

function loadFromUrl(){
  const params=new URLSearchParams(window.location.search);
  const bl=params.get('bl');
  if(!bl) return;
  try{const p=JSON.parse(decodeURIComponent(atob(bl)));state=p.s||{};dynamicItems=p.d||{};saveState();}catch(e){}
}

// ===================== HELPERS =====================
function flatItems(cat){
  const arr=[];
  cat.subcats.forEach(sc=>sc.items.forEach(item=>{
    if(item.freetext)(dynamicItems[item.id]||[]).forEach(di=>arr.push({id:di.id,label:di.label,catId:cat.id,prefix:item['prefix_'+lang]}));
    else arr.push({id:item.id,label:item[lang]||item.fr,catId:cat.id});
  }));
  return arr;
}
function allFlatItems(){return categories.flatMap(cat=>flatItems(cat));}
function genId(){return 'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

// ===================== LAYOUT =====================
function layout(){
  const hero=document.getElementById('hero-banner');
  const heroH=hero?hero.offsetHeight:0;
  const header=document.getElementById('site-header');
  const hh=header?header.offsetHeight:0;
  const nh=document.getElementById('save-notice').offsetHeight;
  const ml=document.getElementById('main-layout');
  ml.style.top=(heroH+hh)+'px';
  ml.style.bottom=nh+'px';
}

// ===================== NAV =====================
function renderNav(){
  document.getElementById('cat-nav').innerHTML=categories.map(cat=>{
    const items=flatItems(cat);
    const done=items.filter(i=>state[i.id]==='done').length;
    const cc=catColor(cat.id);
    return `<div class="cat-nav-item ${activeCatId===cat.id?'active':''}" onclick="navClick('${cat.id}')" style="--cat-bg:${cc.bg};--cat-r:${cc.r};">
      <span class="cat-nav-dot"></span>
      <span>${cat[lang]||cat.fr}</span>
      <span class="cat-count">${done}/${items.length}</span>
    </div>`;
  }).join('');
}
function navClick(catId){
  const content=document.getElementById('content');
  const el=document.getElementById('cat-'+catId);
  if(el&&content) content.scrollTo({top:el.offsetTop-8,behavior:'smooth'});
}

// ===================== CONTENT =====================
function renderContent(){
  const search=document.getElementById('search-input').value.toLowerCase().trim();
  document.getElementById('content').innerHTML=categories.map(cat=>{
    const cc=catColor(cat.id);
    const html=cat.subcats.map(sc=>{
      const ihtml=sc.items.map(item=>item.freetext?renderFreetext(item,search,cat.id):renderStatic(item,search,cat.id)).join('');
      if(!ihtml.trim()) return '';
      return `<div class="subcat" style="--cat-h:${cc.h};--cat-r:${cc.r};">${(sc[lang]||sc.fr)?`<div class="subcat-title" style="color:${cc.h}">${sc[lang]||sc.fr}</div>`:''}<div class="items-grid">${ihtml}</div></div>`;
    }).join('');
    const catItems=flatItems(cat);
    const catDone=catItems.filter(i=>state[i.id]==='done').length;
    const catPct=catItems.length?Math.round(catDone/catItems.length*100):0;
    return `<div class="category-section" id="cat-${cat.id}" style="--cat-bg:${cc.bg};--cat-h:${cc.h};--cat-r:${cc.r};--cat-text:${cc.txt};">
      <div class="cat-sticky" style="background:${cc.bg};">
        <span class="cat-title">${cat[lang]||cat.fr}</span>
        <div class="cat-progress-wrap">
          <div class="cat-progress-track">
            <div class="cat-progress-fill" style="width:${catPct}%"></div>
          </div>
          <div class="cat-progress-label">${catDone} / ${catItems.length} accomplis</div>
        </div>
      </div>
      <div class="cat-body">${html}</div>
    </div>`;
  }).join('');
  layout();setupScrollSpy();
}

function renderStatic(item,search,catId){
  const label=item[lang]||item.fr;
  const status=state[item.id]||null;
  if(search&&!label.toLowerCase().includes(search)) return '';
  if(currentFilter==='done'&&status!=='done') return '';
  if(currentFilter==='todo'&&status!=='todo') return '';
  if(currentFilter==='none'&&status!==null) return '';
  const cc=catColor(catId);
  const cls=status==='done'?'is-done':status==='todo'?'is-todo':'';
  const styleAttr=`--cat-bg:${cc.bg};--cat-h:${cc.h};--cat-r:${cc.r};--cat-text:${cc.txt};`;
  const showDone=status===null||status==='done';
  const showTodo=status===null||status==='todo';
  return `<div class="item ${cls}" id="item-${item.id}" style="${styleAttr}">
    <span class="item-label">${label}</span>
    <div class="item-actions">
      ${showDone?`<button class="check-btn done-btn ${status==='done'?'active':''}" onclick="toggle('${item.id}','done','${catId}')" title="${t('done_label')}">✓</button>`:''}
      ${showTodo?`<button class="check-btn todo-btn ${status==='todo'?'active':''}" onclick="toggle('${item.id}','todo','${catId}')" title="${t('todo_label')}">☆</button>`:''}
    </div>
  </div>`;
}

function renderFreetext(item,search,catId){
  const prefix=item['prefix_'+lang]||item.prefix_fr;
  const isCountry=item.id==='v_pays';
  const ph=isCountry?t('country_p'):t('author_p');
  const dynamics=dynamicItems[item.id]||[];
  const dynHtml=dynamics.map(di=>{
    const status=state[di.id]||null;
    const full=prefix+' '+di.label;
    if(search&&!full.toLowerCase().includes(search)) return '';
    if(currentFilter==='done'&&status!=='done') return '';
    if(currentFilter==='todo'&&status!=='todo') return '';
    if(currentFilter==='none'&&status!==null) return '';
    const cls=status==='done'?'is-done':status==='todo'?'is-todo':'';
    const cc2=catColor(catId);
    const sd=status===null||status==='done', st=status===null||status==='todo';
    return `<div class="item ${cls}" id="item-${di.id}" style="--cat-bg:${cc2.bg};--cat-h:${cc2.h};--cat-r:${cc2.r};--cat-text:${cc2.txt};">
      <span class="item-label">${full}</span>
      <div class="item-actions">
        ${sd?`<button class="check-btn done-btn ${status==='done'?'active':''}" onclick="toggle('${di.id}','done','${catId}')" title="${t('done_label')}">✓</button>`:''}
        ${st?`<button class="check-btn todo-btn ${status==='todo'?'active':''}" onclick="toggle('${di.id}','todo','${catId}')" title="${t('todo_label')}">☆</button>`:''}
        <button class="check-btn del-btn" onclick="removeDynamic('${item.id}','${di.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
  if(currentFilter!=='all'&&currentFilter!=='none') return `<div class="dynamic-items">${dynHtml}</div>`;
  const listAttr=isCountry?'list="dl-pays"':'';
  return `<div class="freetext-row">
    <span class="freetext-prefix">${prefix}</span>
    <input type="text" class="freetext-input" id="ft-${item.id}" placeholder="${ph}" ${listAttr}
      onkeydown="if(event.key==='Enter'){addDynamic('${item.id}');event.preventDefault();}">
    <button class="freetext-add" onclick="addDynamic('${item.id}')">${t('add')}</button>
  </div><div class="dynamic-items">${dynHtml}</div>`;
}

// ===================== INTERACTIONS =====================
function toggle(id,type,catId){
  state[id]=state[id]===type?null:type;
  saveState();
  // Re-render just this item for button visibility
  const el=document.getElementById('item-'+id);
  if(el){
    const s=state[id];
    const label=el.querySelector('.item-label').textContent;
    const cc=catColor(catId||'');
    el.className='item'+(s==='done'?' is-done':s==='todo'?' is-todo':'');
    el.style.setProperty('--cat-bg',cc.bg);
    el.style.setProperty('--cat-h',cc.h);
    el.style.setProperty('--cat-r',cc.r);
    el.style.setProperty('--cat-text',cc.txt);
    // Rebuild buttons
    const showDone=s===null||s==='done';
    const showTodo=s===null||s==='todo';
    const actions=el.querySelector('.item-actions');
    if(actions){
      actions.innerHTML=
        (showDone?`<button class="check-btn done-btn ${s==='done'?'active':''}" onclick="toggle('${id}','done','${catId||''}')" title="${t('done_label')}">✓</button>`:'')+
        (showTodo?`<button class="check-btn todo-btn ${s==='todo'?'active':''}" onclick="toggle('${id}','todo','${catId||''}')" title="${t('todo_label')}">☆</button>`:'');
    }
    if(currentFilter!=='all'&&!(currentFilter==='none'&&!s)&&s!==currentFilter) el.classList.add('hidden');
  }
  updateStats();renderNav();
}
function addDynamic(ftId){
  const input=document.getElementById('ft-'+ftId);
  if(!input||!input.value.trim()) return;
  if(!dynamicItems[ftId]) dynamicItems[ftId]=[];
  dynamicItems[ftId].push({id:ftId+'_'+Date.now(),label:input.value.trim()});
  input.value='';
  saveState();renderContent();updateStats();renderNav();
}
function removeDynamic(ftId,uid){
  dynamicItems[ftId]=(dynamicItems[ftId]||[]).filter(d=>d.id!==uid);
  delete state[uid];
  saveState();renderContent();updateStats();renderNav();
}
function setFilter(filter,btn){
  currentFilter=filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active-all','active-done','active-todo'));
  if(filter==='all') btn.classList.add('active-all');
  else if(filter==='done') btn.classList.add('active-done');
  else if(filter==='todo') btn.classList.add('active-todo');
  renderContent();
}

// ===================== STATS =====================
function updateStats(){
  const all=allFlatItems();
  const done=all.filter(i=>state[i.id]==='done').length;
  const todo=all.filter(i=>state[i.id]==='todo').length;
  const checked=done+todo;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-todo').textContent=todo;
  const pD=checked?Math.round(done/checked*100):0;
  const pT=checked?Math.round(todo/checked*100):0;
  document.getElementById('progress-done').style.width=pD+'%';
  document.getElementById('progress-todo').style.width=pT+'%';
  document.getElementById('progress-todo').style.left=pD+'%';
  const pdEl=document.getElementById('pct-done');
  if(pdEl) pdEl.textContent=checked?`${pD}%`:'—';
  // pct-todo no longer displayed separately
  renderNav();
}

// ===================== SCROLL SPY =====================
function setupScrollSpy(){
  const content=document.getElementById('content');
  if(!content) return;
  content.onscroll=()=>{
    const st=content.scrollTop;
    let cur=categories[0].id;
    categories.forEach(cat=>{const el=document.getElementById('cat-'+cat.id);if(el&&el.offsetTop-60<=st)cur=cat.id;});
    if(activeCatId!==cur){activeCatId=cur;renderNav();}
  };
}

    <div class="r-stat done-s"><div class="r-stat-n">${doneItems.length}</div><div class="r-stat-d">accomplis</div></div>
    <div class="r-stat todo-s"><div class="r-stat-n">${todoItems.length}</div><div class="r-stat-d">sur ma liste</div></div>
    <div class="r-stat done-s"><div class="r-stat-n">${pct}%</div><div class="r-stat-d">des éléments cochés</div></div>`;
  function buildList(items,colClass){
    return categories.map(cat=>{
      const catItems=items.filter(i=>i.catId===cat.id);
      if(!catItems.length) return '';
      return `<div class="res-cat-block open">
        <div class="res-cat-toggle" onclick="this.parentElement.classList.toggle('open')">
          <span class="res-cat-name">${cat[lang]||cat.fr}</span>
          <span style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--text-dim)">${catItems.length}</span><span class="res-cat-arrow">▼</span></span>
        </div>
        <div class="res-cat-items ${colClass}">${catItems.map(i=>`<div class="res-item">${i.prefix?i.prefix+' ':''}${i.label}</div>`).join('')}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('results-lists').innerHTML=`
    <div><div class="res-col-title done-t">${t('what_done')}</div>${buildList(doneItems,'done-col')||'<div style="color:var(--text-dim);font-size:13px">—</div>'}</div>
    <div><div class="res-col-title todo-t">${t('what_todo')}</div>${buildList(todoItems,'todo-col')||'<div style="color:var(--text-dim);font-size:13px">—</div>'}</div>`;
}
function closeResults(){document.getElementById('results-panel').classList.remove('open');}

function saveToUrl(){
  const payload={s:state,d:dynamicItems};
  const encoded=btoa(encodeURIComponent(JSON.stringify(payload)));
  const url=window.location.href.split('?')[0]+'?bl='+encoded;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.querySelector('.save-url-btn');
    const orig=btn.textContent;btn.textContent='✓ '+t('save_copied');
    setTimeout(()=>btn.textContent=orig,2500);
  });
}

// ===================== POSTER =====================
let posterPortrait=true;
function openPoster(){document.getElementById('poster-panel').classList.add('open');drawPoster();}
function closePoster(){document.getElementById('poster-panel').classList.remove('open');}
function toggleOrientation(){posterPortrait=!posterPortrait;drawPoster();}

function drawPoster(){
  const canvas=document.getElementById('poster-canvas');
  const W=posterPortrait?2480:3508, H=posterPortrait?3508:2480;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  const BG='#F5F0E8',BORDER='#D8D0C0',TEXT='#1C1810',MUTED='#7A7060',DIM='#B8AE9A',GREEN='#2D5016',TERRA='#C4622D';
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  const PAD=110, colW=(W-PAD*2-80)/2;
  ctx.fillStyle=TEXT;
  ctx.font=`italic ${posterPortrait?100:82}px Georgia,serif`;
  ctx.fillText('Bucket List',PAD,PAD+72);
  const all=allFlatItems();
  const doneItems=all.filter(i=>state[i.id]==='done');
  const todoItems=all.filter(i=>state[i.id]==='todo');
  const total=doneItems.length+todoItems.length;
  const dateStr=new Date().toLocaleDateString(lang==='fr'?'fr-CA':'en-CA',{year:'numeric',month:'long',day:'numeric'});
  ctx.fillStyle=MUTED;ctx.font=`${posterPortrait?32:26}px 'DM Sans',sans-serif`;
  ctx.fillText(`${dateStr}   ·   ${total} élément${total>1?'s':''} coché${total>1?'s':''}`,PAD,PAD+120);
  ctx.strokeStyle=BORDER;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(PAD,PAD+148);ctx.lineTo(W-PAD,PAD+148);ctx.stroke();
  const COL_Y=PAD+190, FS=posterPortrait?24:20, FScat=posterPortrait?28:24, lineH=FS*1.7, cbSize=FS*0.72;

  function drawCol(items,x,color,title){
    ctx.fillStyle=color;ctx.font=`italic ${posterPortrait?48:40}px Georgia,serif`;ctx.fillText(title,x,COL_Y);
    let y=COL_Y+FScat*2;
    categories.forEach(cat=>{
      const catItems=items.filter(i=>i.catId===cat.id);
      if(!catItems.length) return;
      ctx.fillStyle=MUTED;ctx.font=`500 ${FS*0.65}px 'DM Sans',sans-serif`;
      ctx.fillText((cat[lang]||cat.fr).toUpperCase(),x,y);
      ctx.strokeStyle=BORDER;ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(x,y+6);ctx.lineTo(x+colW,y+6);ctx.stroke();
      y+=FScat*0.9;
      catItems.forEach(item=>{
        if(y>H-PAD) return;
        const label=item.prefix?item.prefix+' '+item.label:item.label;
        const cb=cbSize, cbY=y-cb*0.8;
        ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.strokeRect(x,cbY,cb,cb);
        if(color===GREEN){
          ctx.strokeStyle=GREEN;ctx.lineWidth=2;ctx.beginPath();
          ctx.moveTo(x+cb*0.18,cbY+cb*0.5);ctx.lineTo(x+cb*0.42,cbY+cb*0.78);ctx.lineTo(x+cb*0.82,cbY+cb*0.22);ctx.stroke();
          ctx.fillStyle=TEXT;
        } else {ctx.fillStyle=MUTED;}
        ctx.font=`${FS}px 'DM Sans',sans-serif`;
        const textX=x+cb+12, maxW=colW-cb-12;
        const words=label.split(' ');let line='';
        words.forEach((w,i)=>{
          const test=line+w+(i<words.length-1?' ':'');
          if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,textX,y);line=w+' ';y+=lineH*0.82;}
          else line=test;
        });
        ctx.fillText(line,textX,y);y+=lineH;
      });
      y+=lineH*0.25;
    });
  }
  drawCol(doneItems,PAD,GREEN,t('poster_done'));
  drawCol(todoItems,PAD+colW+80,TERRA,t('poster_todo'));
  ctx.fillStyle=DIM;ctx.font=`${posterPortrait?24:20}px 'DM Sans',sans-serif`;
  ctx.fillText('studioexistence.com/bucket-list',PAD,H-PAD+24);
}

function downloadPoster(){
  const link=document.createElement('a');link.download='bucket-list.png';
  link.href=document.getElementById('poster-canvas').toDataURL('image/png');link.click();
}

// ===================== ADMIN =====================
let adminCatId = null;

const ADMIN_HASH='0d1afaf745c410a17f3ac348207a096d00b18ebc133dade357efcce99bbba8fa';

async function hashPassword(pwd){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function openAdmin(){
  const pwd=prompt('Mot de passe admin :');
  if(pwd===null) return;
  const hash=await hashPassword(pwd);
  if(hash!==ADMIN_HASH){
    alert('Mot de passe incorrect.');
    return;
  }
  document.getElementById('admin-panel').classList.add('open');
  adminCatId=categories[0].id;
  renderAdminNav();
  renderAdminContent();
}
function closeAdmin(){
  document.getElementById('admin-panel').classList.remove('open');
  renderContent();renderNav();updateStats();
}

function renderAdminNav(){
  document.getElementById('admin-nav').innerHTML = categories.map(cat=>{
    const total = cat.subcats.reduce((n,sc)=>n+sc.items.length,0);
    return `<div class="admin-nav-item ${adminCatId===cat.id?'active':''}" onclick="adminSelectCat('${cat.id}')">
      <span>${cat.fr}</span><span class="admin-nav-count">${total}</span>
    </div>`;
  }).join('')
  + `<div style="padding:12px;margin-top:8px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;letter-spacing:0.5px">NOUVELLE CATÉGORIE</div>
      <div style="display:flex;gap:6px">
        <input type="text" class="admin-add-input" id="new-cat-input" placeholder="Nom de la catégorie" style="font-size:12px;padding:5px 8px">
        <button class="admin-add-btn" onclick="adminAddCategory()" style="font-size:12px;padding:5px 10px">+</button>
      </div>
    </div>`;
}

function adminSelectCat(catId){
  adminCatId=catId;
  renderAdminNav();
  renderAdminContent();
}

function renderAdminContent(){
  const cat=categories.find(c=>c.id===adminCatId);
  if(!cat) return;
  const area=document.getElementById('admin-content');

  const subcatsHtml=cat.subcats.map((sc,si)=>{
    if(sc.items.some(i=>i.freetext)) return ''; // skip freetext subcats
    const scTitle=sc.fr||'(sans titre)';
    const itemsHtml=sc.items.map((item,ii)=>`
      <div class="admin-item-row">
        <span class="admin-item-text">${item.fr}</span>
        ${item.en?`<span class="admin-item-freetext">${item.en}</span>`:''}
        <button class="admin-del-btn" onclick="adminDeleteItem('${cat.id}',${si},${ii})" title="Supprimer">✕</button>
      </div>`).join('');

    // Subcat title (editable for non-empty)
    const titleHtml=sc.fr
      ? `<div class="admin-subcat-title">${scTitle} <span style="font-size:10px;color:var(--text-dim);font-style:italic">(${sc.items.length} éléments)</span></div>`
      : `<div class="admin-subcat-title">(sans sous-catégorie)</div>`;

    return `<div class="admin-subcat">
      ${titleHtml}
      ${itemsHtml}
      <div class="admin-add-row">
        <input type="text" class="admin-add-input" id="add-fr-${si}" placeholder="Libellé français">
        <input type="text" class="admin-add-input" id="add-en-${si}" placeholder="English label">
        <button class="admin-add-btn" onclick="adminAddItem('${cat.id}',${si})">+ Ajouter</button>
      </div>
    </div>`;
  }).join('');

  // Add new subcat
  const newSubcatHtml=`<div class="admin-subcat" style="margin-top:16px;padding-top:16px;border-top:1px dashed var(--border)">
    <div class="admin-subcat-title" style="color:var(--done)">+ Nouvelle sous-catégorie</div>
    <div class="admin-add-row">
      <input type="text" class="admin-add-input" id="new-subcat-name" placeholder="Nom de la sous-catégorie (optionnel)">
      <input type="text" class="admin-add-input" id="new-subcat-fr" placeholder="Premier élément (français)">
      <input type="text" class="admin-add-input" id="new-subcat-en" placeholder="First item (English)">
      <button class="admin-add-btn" onclick="adminAddSubcat('${cat.id}')">+ Créer</button>
    </div>
  </div>`;

  // Delete category button
  const delCatHtml=`<div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px">
    <button onclick="adminDeleteCategory('${cat.id}')" style="background:none;border:1px solid #dc2626;color:#dc2626;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--font-body);font-size:12px;transition:all 0.2s" onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='none'">
      Supprimer la catégorie "${cat.fr}"
    </button>
    <span style="font-size:11px;color:var(--text-dim)">Cette action est irréversible</span>
  </div>`;

  area.innerHTML=`
    <div class="admin-cat-header">
      <div class="admin-cat-title">${cat.fr}</div>
    </div>
    ${subcatsHtml}
    ${newSubcatHtml}
    ${delCatHtml}`;
}

function adminAddItem(catId, scIdx){
  const cat=categories.find(c=>c.id===catId);
  if(!cat) return;
  const frInput=document.getElementById(`add-fr-${scIdx}`);
  const enInput=document.getElementById(`add-en-${scIdx}`);
  const fr=frInput.value.trim(), en=enInput.value.trim();
  if(!fr) return;
  cat.subcats[scIdx].items.push({id:genId(),fr,en:en||fr});
  frInput.value='';enInput.value='';
  saveCategories();
  renderAdminNav();
  renderAdminContent();
}

function adminDeleteItem(catId,scIdx,itemIdx){
  const cat=categories.find(c=>c.id===catId);
  if(!cat) return;
  if(!confirm(`Supprimer "${cat.subcats[scIdx].items[itemIdx].fr}" ?`)) return;
  cat.subcats[scIdx].items.splice(itemIdx,1);
  saveCategories();
  renderAdminNav();
  renderAdminContent();
}

function adminAddSubcat(catId){
  const cat=categories.find(c=>c.id===catId);
  if(!cat) return;
  const name=document.getElementById('new-subcat-name').value.trim();
  const fr=document.getElementById('new-subcat-fr').value.trim();
  const en=document.getElementById('new-subcat-en').value.trim();
  const items=fr?[{id:genId(),fr,en:en||fr}]:[];
  cat.subcats.push({fr:name,en:name,items});
  saveCategories();
  renderAdminNav();
  renderAdminContent();
}

function adminAddCategory(){
  const input=document.getElementById('new-cat-input');
  const name=input.value.trim();
  if(!name) return;
  const id='cat_'+Date.now().toString(36);
  categories.push({id,fr:name,en:name,subcats:[{fr:'',en:'',items:[]}]});
  input.value='';
  adminCatId=id;
  saveCategories();
  renderAdminNav();
  renderAdminContent();
}

function adminDeleteCategory(catId){
  if(!confirm(`Supprimer toute la catégorie "${categories.find(c=>c.id===catId)?.fr}" ?`)) return;
  categories=categories.filter(c=>c.id!==catId);
  adminCatId=categories[0]?.id||null;
  saveCategories();
  renderAdminNav();
  renderAdminContent();
}

// ===================== INIT =====================
lang=localStorage.getItem('bl-lang')||'fr';
loadFromUrl();
loadState();
renderContent();
renderNav();
updateStats();
setLang(lang);
// Position header below hero, then layout
function positionAll(){
  const hero=document.getElementById('hero-banner');
  const header=document.getElementById('site-header');
  if(hero&&header) header.style.top=hero.offsetHeight+'px';
  layout();
}
positionAll();
window.addEventListener('resize',positionAll);

// Secret admin URL trigger
if(window.location.search.includes('admin')){
  // Remove ?admin from URL bar without reload
  history.replaceState(null,'',window.location.pathname);
  openAdmin();
}
</script>
