<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bucket List</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --bg2: #EDE8DC;
    --surface: #FDFAF4;
    --surface2: #F0EBE0;
    --border: #D8D0C0;
    --border2: #C8BEA8;
    --text: #1C1810;
    --text-muted: #7A7060;
    --text-dim: #B8AE9A;
    --done: #2D5016;
    --todo: #C4622D;
    --done-dim: rgba(45,80,22,0.10);
    --todo-dim: rgba(196,98,45,0.10);
    --done-mid: rgba(45,80,22,0.25);
    --todo-mid: rgba(196,98,45,0.25);
    --font-display: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;overflow:hidden;}

  /* HEADER */
  #site-header{padding:36px 40px 24px;border-bottom:1px solid var(--border);position:fixed;top:0;left:0;right:0;background:rgba(245,240,232,0.97);backdrop-filter:blur(12px);z-index:100;}
  .header-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;}
  h1{font-family:var(--font-display);font-size:36px;font-weight:400;letter-spacing:-0.5px;line-height:1;color:var(--text);}
  h1 em{font-style:italic;color:var(--done);}
  .lang-toggle{display:flex;gap:6px;}
  .lang-btn{background:none;border:1px solid var(--border2);color:var(--text-muted);padding:3px 11px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-size:12px;letter-spacing:0.5px;transition:all 0.2s;}
  .lang-btn.active{border-color:var(--done);color:var(--done);background:var(--done-dim);}

  /* STATS */
  .stats-bar{display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
  .stat{display:flex;flex-direction:column;gap:1px;}
  .stat-value{font-family:var(--font-display);font-size:24px;line-height:1;}
  .stat-value.done{color:var(--done);}
  .stat-value.todo{color:var(--todo);}
  .stat-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;}
  .stat-divider{width:1px;height:28px;background:var(--border);}
  .progress-wrap{flex:1;min-width:160px;}
  .progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;position:relative;}
  .progress-fill-done{position:absolute;left:0;top:0;height:100%;background:var(--done);border-radius:2px;transition:width 0.4s;}
  .progress-fill-todo{position:absolute;top:0;height:100%;background:var(--todo);border-radius:2px;transition:all 0.4s;}
  .progress-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:11px;}

  /* CONTROLS */
  #site-controls{padding:12px 40px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:rgba(245,240,232,0.97);backdrop-filter:blur(12px);position:fixed;left:0;right:0;z-index:99;}
  .search-wrap{position:relative;flex:1;min-width:160px;max-width:340px;}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;}
  input[type="text"]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 10px 7px 30px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color 0.2s;}
  input[type="text"]:focus{border-color:var(--done);}
  input[type="text"]::placeholder{color:var(--text-dim);}
  .filter-btns{display:flex;gap:5px;flex-wrap:wrap;}
  .filter-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:5px 11px;border-radius:6px;cursor:pointer;font-family:var(--font-body);font-size:12px;transition:all 0.2s;white-space:nowrap;}
  .filter-btn:hover{border-color:var(--border2);color:var(--text);}
  .filter-btn.active-done{border-color:var(--done);color:var(--done);background:var(--done-dim);}
  .filter-btn.active-todo{border-color:var(--todo);color:var(--todo);background:var(--todo-dim);}
  .filter-btn.active-all{border-color:var(--text);color:var(--text);}
  .results-btn{margin-left:auto;background:var(--done);color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:500;transition:opacity 0.2s;white-space:nowrap;}
  .results-btn:hover{opacity:0.85;}

  /* MAIN */
  #main-layout{display:flex;position:fixed;left:0;right:0;bottom:0;}
  .cat-nav{width:196px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:18px 0;background:var(--bg2);}
  .cat-nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;cursor:pointer;transition:all 0.15s;font-size:13px;color:var(--text-muted);border-left:2px solid transparent;}
  .cat-nav-item:hover{color:var(--text);background:var(--surface2);}
  .cat-nav-item.active{color:var(--done);border-left-color:var(--done);background:var(--done-dim);}
  .cat-count{font-size:11px;color:var(--text-dim);}
  .cat-nav-item.active .cat-count{color:var(--done);opacity:0.7;}
  .content{flex:1;overflow-y:auto;padding:32px 40px;}
  .category-section{margin-bottom:48px;}
  .cat-header{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .cat-title{font-family:var(--font-display);font-size:21px;font-weight:400;letter-spacing:-0.2px;color:var(--text);}
  .subcat{margin-bottom:22px;}
  .subcat-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
  .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:5px;}
  .item{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 12px;display:flex;align-items:center;gap:8px;transition:all 0.15s;box-shadow:var(--shadow);}
  .item:hover{border-color:var(--border2);background:var(--surface2);}
  .item.is-done{border-color:var(--done-mid);background:var(--done-dim);}
  .item.is-todo{border-color:var(--todo-mid);background:var(--todo-dim);}
  .item.hidden{display:none;}
  .item-label{flex:1;font-size:13px;line-height:1.4;color:var(--text);}
  .item.is-done .item-label{color:var(--done);}
  .item.is-todo .item-label{color:var(--todo);}
  .item-actions{display:flex;gap:4px;flex-shrink:0;}
  .check-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.15s;color:var(--text-muted);}
  .check-btn:hover{border-color:var(--border2);color:var(--text);}
  .check-btn.done-btn:hover,.check-btn.done-btn.active{background:var(--done);border-color:var(--done);color:#fff;}
  .check-btn.todo-btn:hover,.check-btn.todo-btn.active{background:var(--todo);border-color:var(--todo);color:#fff;}

  /* FREETEXT */
  .freetext-row{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;box-shadow:var(--shadow);}
  .freetext-prefix{font-size:13px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;}
  .freetext-input{flex:1;min-width:80px;background:none;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:1px 4px;font-size:13px;color:var(--text);outline:none;font-family:var(--font-body);}
  .freetext-input:focus{border-bottom-color:var(--done);}
  .freetext-add{background:none;border:1px solid var(--border);color:var(--text-muted);padding:2px 9px;border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--font-body);transition:all 0.15s;white-space:nowrap;}
  .freetext-add:hover{border-color:var(--done);color:var(--done);}
  .dynamic-items{display:flex;flex-direction:column;gap:5px;margin-bottom:5px;}

  /* SAVE NOTICE */
  #save-notice{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:7px;font-size:11px;color:var(--text-dim);letter-spacing:0.5px;border-top:1px solid var(--border);background:var(--bg2);z-index:50;}

  /* ===================== RESULTS PANEL ===================== */
  #results-panel{display:none;position:fixed;inset:0;background:rgba(245,240,232,0.99);z-index:200;overflow-y:auto;padding:48px 60px;}
  #results-panel.open{display:block;}
  .results-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;}
  .results-title{font-family:var(--font-display);font-size:40px;font-weight:400;color:var(--text);}
  .results-title em{font-style:italic;color:var(--done);}
  .results-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .close-btn{background:none;border:1px solid var(--border2);color:var(--text-muted);padding:7px 16px;border-radius:6px;cursor:pointer;font-family:var(--font-body);font-size:13px;transition:all 0.2s;}
  .close-btn:hover{border-color:var(--text);color:var(--text);}
  .save-url-btn{background:none;border:1px solid var(--border2);color:var(--text-muted);padding:7px 16px;border-radius:6px;cursor:pointer;font-family:var(--font-body);font-size:13px;transition:all 0.2s;}
  .save-url-btn:hover{border-color:var(--done);color:var(--done);}
  .poster-btn-main{background:var(--done);color:#fff;border:none;padding:7px 18px;border-radius:6px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:500;transition:opacity 0.2s;}
  .poster-btn-main:hover{opacity:0.85;}

  /* RESULTS STATS */
  .results-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:32px;}
  .r-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;box-shadow:var(--shadow);}
  .r-stat.done-s{border-color:var(--done-mid);background:var(--done-dim);}
  .r-stat.todo-s{border-color:var(--todo-mid);background:var(--todo-dim);}
  .r-stat-n{font-family:var(--font-display);font-size:40px;line-height:1;margin-bottom:3px;}
  .done-s .r-stat-n{color:var(--done);}
  .todo-s .r-stat-n{color:var(--todo);}
  .r-stat-d{font-size:11px;color:var(--text-muted);}

  /* RESULTS LISTS */
  .results-lists{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:32px;}
  .res-list-col{}
  .res-col-title{font-family:var(--font-display);font-size:20px;font-weight:400;margin-bottom:14px;}
  .res-col-title.done-t{color:var(--done);}
  .res-col-title.todo-t{color:var(--todo);}

  /* CATEGORY TOGGLE */
  .res-cat-block{margin-bottom:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow);}
  .res-cat-toggle{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;transition:background 0.15s;user-select:none;}
  .res-cat-toggle:hover{background:var(--surface2);}
  .res-cat-name{font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:500;color:var(--text-muted);}
  .res-cat-count{font-size:11px;color:var(--text-dim);}
  .res-cat-arrow{font-size:10px;color:var(--text-dim);transition:transform 0.2s;}
  .res-cat-block.open .res-cat-arrow{transform:rotate(180deg);}
  .res-cat-items{display:none;padding:4px 14px 10px;}
  .res-cat-block.open .res-cat-items{display:block;}
  .res-item{font-size:12.5px;color:var(--text-muted);padding:3px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
  .res-item:last-child{border-bottom:none;}
  .res-item::before{content:'';width:3px;height:3px;border-radius:50%;flex-shrink:0;margin-top:1px;}
  .done-col .res-item::before{background:var(--done);}
  .todo-col .res-item::before{background:var(--todo);}

  /* ===================== POSTER ===================== */
  #poster-panel{display:none;position:fixed;inset:0;background:rgba(28,24,16,0.92);z-index:300;overflow-y:auto;padding:40px;align-items:flex-start;justify-content:center;}
  #poster-panel.open{display:flex;}
  .poster-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;}
  .poster-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .p-btn{background:none;border:1px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);padding:7px 16px;border-radius:6px;cursor:pointer;font-family:var(--font-body);font-size:13px;transition:all 0.2s;}
  .p-btn:hover{border-color:#fff;color:#fff;}
  .p-btn.primary{background:var(--done);border-color:var(--done);color:#fff;}
  .p-btn.primary:hover{opacity:0.85;}
  #poster-canvas{max-width:100%;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,0.5);}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>

<header id="site-header">
  <div class="header-top">
    <h1>Bucket <em>List</em></h1>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value done" id="stat-done">0</span>
      <span class="stat-label">Accomplis</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="stat-value todo" id="stat-todo">0</span>
      <span class="stat-label">Sur ma liste</span>
    </div>
    <div class="stat-divider"></div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill-done" id="progress-done" style="width:0%"></div>
        <div class="progress-fill-todo" id="progress-todo" style="width:0%;left:0%"></div>
      </div>
      <div class="progress-labels">
        <span id="pct-done" style="color:var(--done)">—</span>
        <span id="pct-todo" style="color:var(--todo)">—</span>
      </div>
    </div>
  </div>
</header>

<div id="site-controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Rechercher..." oninput="renderContent()">
  </div>
  <div class="filter-btns">
    <button class="filter-btn active-all" onclick="setFilter('all',this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('done',this)">✓ Accomplis</button>
    <button class="filter-btn" onclick="setFilter('todo',this)">☆ À faire</button>
    <button class="filter-btn" onclick="setFilter('none',this)">Non cochés</button>
  </div>
  <button class="results-btn" onclick="openResults()">Voir mes résultats →</button>
</div>

<div id="main-layout">
  <nav class="cat-nav" id="cat-nav"></nav>
  <div class="content" id="content"></div>
</div>

<div id="save-notice">💾 Votre liste est sauvegardée dans ce navigateur.</div>

<!-- RESULTS PANEL -->
<div id="results-panel">
  <div class="results-header">
    <div class="results-title">Ma <em>Bucket List</em></div>
    <div class="results-actions">
      <button class="save-url-btn" onclick="saveToUrl()">🔗 Sauvegarder le lien</button>
      <button class="poster-btn-main" onclick="openPoster()">🖼 Générer le poster</button>
      <button class="close-btn" onclick="closeResults()">Fermer ✕</button>
    </div>
  </div>
  <div class="results-stats" id="results-stats"></div>
  <div class="results-lists" id="results-lists"></div>
</div>

<!-- POSTER PANEL -->
<div id="poster-panel">
  <div class="poster-wrap">
    <div class="poster-controls">
      <button class="p-btn" onclick="closePoster()">← Retour</button>
      <button class="p-btn" onclick="toggleOrientation()">⟳ Portrait / Paysage</button>
      <button class="p-btn primary" onclick="downloadPoster()">⬇ Télécharger PNG</button>
    </div>
    <canvas id="poster-canvas"></canvas>
  </div>
</div>

<datalist id="dl-pays"></datalist>

<script>
// ===================== i18n =====================
const i18n={
  fr:{add:'Ajouter',done_label:'Fait',todo_label:'À faire',accomplished:'Accomplis',on_list:'Sur ma liste',
    of_checked:'des éléments cochés',done_items:'accomplis',todo_items:'sur ma liste',
    search_p:'Rechercher...',country_p:'Nom du pays...',author_p:"Nom de l'auteur...",
    what_done:'Ce que j\'ai accompli',what_todo:'Ce que je veux encore faire',
    save_copied:'Lien copié !',no_items:'Aucun élément',
    poster_done:'Ce que j\'ai accompli',poster_todo:'Ce que je veux encore faire',
  },
  en:{add:'Add',done_label:'Done',todo_label:'To do',accomplished:'Accomplished',on_list:'On my list',
    of_checked:'of checked items',done_items:'accomplished',todo_items:'on my list',
    search_p:'Search...',country_p:'Country name...',author_p:'Author name...',
    what_done:'What I\'ve accomplished',what_todo:'What I still want to do',
    save_copied:'Link copied!',no_items:'No items',
    poster_done:'What I\'ve accomplished',poster_todo:'What I still want to do',
  }
};
let lang=localStorage.getItem('bl-lang')||'fr';
const t=k=>i18n[lang][k]||k;

function setLang(l){
  lang=l;localStorage.setItem('bl-lang',l);
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  document.getElementById('search-input').placeholder=t('search_p');
  renderContent();updateStats();
}

// ===================== COUNTRIES =====================
const countries=["Afghanistan","Afrique du Sud","Albanie","Algérie","Allemagne","Andorre","Angola","Antigua-et-Barbuda","Arabie saoudite","Argentine","Arménie","Australie","Autriche","Azerbaïdjan","Bahamas","Bahreïn","Bangladesh","Barbade","Bélarus","Belgique","Belize","Bénin","Bhoutan","Bolivie","Bosnie-Herzégovine","Botswana","Brésil","Brunéi","Bulgarie","Burkina Faso","Burundi","Cabo Verde","Cambodge","Cameroun","Canada","Centrafrique","Chili","Chine","Chypre","Colombie","Comores","Congo","Congo (RDC)","Corée du Nord","Corée du Sud","Costa Rica","Côte d'Ivoire","Croatie","Cuba","Danemark","Djibouti","Dominique","Égypte","Émirats arabes unis","Équateur","Érythrée","Espagne","Eswatini","Estonie","États-Unis","Éthiopie","Fidji","Finlande","France","Gabon","Gambie","Géorgie","Ghana","Grèce","Grenade","Guatemala","Guinée","Guinée-Bissau","Guinée équatoriale","Guyana","Haïti","Honduras","Hongrie","Inde","Indonésie","Irak","Iran","Irlande","Islande","Israël","Italie","Jamaïque","Japon","Jordanie","Kazakhstan","Kenya","Kirghizistan","Kiribati","Kosovo","Koweït","Laos","Lesotho","Lettonie","Liban","Libéria","Libye","Liechtenstein","Lituanie","Luxembourg","Madagascar","Malaisie","Malawi","Maldives","Mali","Malte","Maroc","Marshall","Maurice","Mauritanie","Mexique","Micronésie","Moldavie","Monaco","Mongolie","Monténégro","Mozambique","Myanmar","Namibie","Nauru","Népal","Nicaragua","Niger","Nigeria","Norvège","Nouvelle-Zélande","Oman","Ouganda","Ouzbékistan","Pakistan","Palaos","Palestine","Panama","Papouasie-Nouvelle-Guinée","Paraguay","Pays-Bas","Pérou","Philippines","Pologne","Portugal","Qatar","Roumanie","Royaume-Uni","Russie","Rwanda","Saint-Christophe-et-Niévès","Saint-Marin","Saint-Vincent-et-les-Grenadines","Sainte-Lucie","Salomon","Salvador","Samoa","São Tomé-et-Príncipe","Sénégal","Serbie","Seychelles","Sierra Leone","Singapour","Slovaquie","Slovénie","Somalie","Soudan","Soudan du Sud","Sri Lanka","Suède","Suisse","Suriname","Syrie","Tadjikistan","Tanzanie","Tchad","Thaïlande","Timor oriental","Togo","Tonga","Trinité-et-Tobago","Tunisie","Turkménistan","Turquie","Tuvalu","Ukraine","Uruguay","Vanuatu","Vatican","Venezuela","Viêt Nam","Yémen","Zambie","Zimbabwe"];
const dl=document.getElementById('dl-pays');
countries.forEach(c=>{const o=document.createElement('option');o.value=c;dl.appendChild(o);});

// ===================== DATA =====================
const categories=[
  {id:'nature',fr:'Nature',en:'Nature',subcats:[
    {fr:'Ciel & astres',en:'Sky & Stars',items:[
      {id:'n1',fr:"Voir la Voie lactée à l'œil nu",en:'See the Milky Way with the naked eye'},
      {id:'n2',fr:'Voir une aurore boréale',en:'See the northern lights'},
      {id:'n3',fr:'Assister à une éclipse lunaire',en:'Witness a lunar eclipse'},
      {id:'n4',fr:'Assister à une éclipse solaire',en:'Witness a solar eclipse'},
      {id:'n5',fr:'Regarder la Lune au télescope',en:'Look at the Moon through a telescope'},
      {id:'n6',fr:'Voir Jupiter et ses lunes au télescope',en:'See Jupiter and its moons through a telescope'},
      {id:'n7',fr:"Voir Saturne et ses anneaux au télescope",en:"See Saturn's rings through a telescope"},
      {id:'n8',fr:'Voir un lever de soleil',en:'Watch a sunrise'},
      {id:'n9',fr:'Voir un lever de Lune',en:'Watch a moonrise'},

// ===================== STATE =====================
let state={}, dynamicItems={}, currentFilter='all', activeCatId=categories[0].id;

function loadState(){
  try{state=JSON.parse(localStorage.getItem('bl-state')||'{}');}catch(e){state={};}
  try{dynamicItems=JSON.parse(localStorage.getItem('bl-dynamic')||'{}');}catch(e){dynamicItems={};}
}
function saveState(){
  localStorage.setItem('bl-state',JSON.stringify(state));
  localStorage.setItem('bl-dynamic',JSON.stringify(dynamicItems));
}

// URL encode/decode
function saveToUrl(){
  const payload={s:state,d:dynamicItems};
  const encoded=btoa(encodeURIComponent(JSON.stringify(payload)));
  const url=window.location.href.split('?')[0]+'?bl='+encoded;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.querySelector('.save-url-btn');
    const orig=btn.textContent;
    btn.textContent='✓ '+t('save_copied');
    setTimeout(()=>btn.textContent=orig,2500);
  });
}

function loadFromUrl(){
  const params=new URLSearchParams(window.location.search);
  const bl=params.get('bl');
  if(!bl) return false;
  try{
    const payload=JSON.parse(decodeURIComponent(atob(bl)));
    state=payload.s||{};
    dynamicItems=payload.d||{};
    saveState();
    return true;
  }catch(e){return false;}
}

// ===================== HELPERS =====================
function flatItems(cat){
  const arr=[];
  cat.subcats.forEach(sc=>sc.items.forEach(item=>{
    if(item.freetext){
      (dynamicItems[item.id]||[]).forEach(di=>arr.push({id:di.id,label:di.label,catId:cat.id,prefix:item['prefix_'+lang]}));
    } else {
      arr.push({id:item.id,label:item[lang],catId:cat.id});
    }
  }));
  return arr;
}
function allFlatItems(){return categories.flatMap(cat=>flatItems(cat));}

// ===================== LAYOUT =====================
function layout(){
  const hh=document.getElementById('site-header').offsetHeight;
  const ch=document.getElementById('site-controls').offsetHeight;
  const nh=document.getElementById('save-notice').offsetHeight;
  document.getElementById('site-controls').style.top=hh+'px';
  const ml=document.getElementById('main-layout');
  ml.style.top=(hh+ch)+'px';
  ml.style.bottom=nh+'px';
}

// ===================== RENDER NAV =====================
function renderNav(){
  document.getElementById('cat-nav').innerHTML=categories.map(cat=>{
    const items=flatItems(cat);
    const done=items.filter(i=>state[i.id]==='done').length;
    return `<div class="cat-nav-item ${activeCatId===cat.id?'active':''}" onclick="navClick('${cat.id}')">
      <span>${cat[lang]}</span><span class="cat-count">${done}/${items.length}</span>
    </div>`;
  }).join('');
}

function navClick(catId){
  const content=document.getElementById('content');
  const el=document.getElementById('cat-'+catId);
  if(el&&content) content.scrollTo({top:el.offsetTop-8,behavior:'smooth'});
}

// ===================== RENDER CONTENT =====================
function renderContent(){
  const search=document.getElementById('search-input').value.toLowerCase().trim();
  document.getElementById('content').innerHTML=categories.map(cat=>{
    const html=cat.subcats.map(sc=>{
      const ihtml=sc.items.map(item=>item.freetext?renderFreetext(item,search):renderStatic(item,search)).join('');
      if(!ihtml.trim()) return '';
      return `<div class="subcat">${sc[lang]?`<div class="subcat-title">${sc[lang]}</div>`:''}<div class="items-grid">${ihtml}</div></div>`;
    }).join('');
    return `<div class="category-section" id="cat-${cat.id}">
      <div class="cat-header"><span class="cat-title">${cat[lang]}</span></div>${html}
    </div>`;
  }).join('');
  layout(); setupScrollSpy();
}

function renderStatic(item,search){
  const label=item[lang],status=state[item.id]||null;
  if(search&&!label.toLowerCase().includes(search)) return '';
  if(currentFilter==='done'&&status!=='done') return '';
  if(currentFilter==='todo'&&status!=='todo') return '';
  if(currentFilter==='none'&&status!==null) return '';
  const cls=status==='done'?'is-done':status==='todo'?'is-todo':'';
  return `<div class="item ${cls}" id="item-${item.id}">
    <span class="item-label">${label}</span>
    <div class="item-actions">
      <button class="check-btn done-btn ${status==='done'?'active':''}" onclick="toggle('${item.id}','done')" title="${t('done_label')}">✓</button>
      <button class="check-btn todo-btn ${status==='todo'?'active':''}" onclick="toggle('${item.id}','todo')" title="${t('todo_label')}">☆</button>
    </div>
  </div>`;
}

function renderFreetext(item,search){
  const prefix=item['prefix_'+lang]||item.prefix_fr;
  const isCountry=item.id==='v_pays';
  const ph=isCountry?t('country_p'):t('author_p');
  const dynamics=dynamicItems[item.id]||[];
  const dynHtml=dynamics.map(di=>{
    const status=state[di.id]||null;
    const full=prefix+' '+di.label;
    if(search&&!full.toLowerCase().includes(search)) return '';
    if(currentFilter==='done'&&status!=='done') return '';
    if(currentFilter==='todo'&&status!=='todo') return '';
    if(currentFilter==='none'&&status!==null) return '';
    const cls=status==='done'?'is-done':status==='todo'?'is-todo':'';
    return `<div class="item ${cls}" id="item-${di.id}">
      <span class="item-label">${full}</span>
      <div class="item-actions">
        <button class="check-btn done-btn ${status==='done'?'active':''}" onclick="toggle('${di.id}','done')" title="${t('done_label')}">✓</button>
        <button class="check-btn todo-btn ${status==='todo'?'active':''}" onclick="toggle('${di.id}','todo')" title="${t('todo_label')}">☆</button>
        <button class="check-btn" onclick="removeDynamic('${item.id}','${di.id}')" style="font-size:9px;color:var(--text-dim)">✕</button>
      </div>
    </div>`;
  }).join('');
  if(currentFilter!=='all'&&currentFilter!=='none') return `<div class="dynamic-items">${dynHtml}</div>`;
  const listAttr=isCountry?'list="dl-pays"':'';
  return `<div class="freetext-row">
    <span class="freetext-prefix">${prefix}</span>
    <input type="text" class="freetext-input" id="ft-${item.id}" placeholder="${ph}" ${listAttr}
      onkeydown="if(event.key==='Enter'){addDynamic('${item.id}');event.preventDefault();}">
    <button class="freetext-add" onclick="addDynamic('${item.id}')">${t('add')}</button>
  </div>
  <div class="dynamic-items">${dynHtml}</div>`;
}

// ===================== INTERACTIONS =====================
function toggle(id,type){
  state[id]=state[id]===type?null:type;
  saveState();
  const el=document.getElementById('item-'+id);
  if(el){
    const s=state[id];
    el.className='item'+(s==='done'?' is-done':s==='todo'?' is-todo':'');
    el.querySelector('.done-btn').classList.toggle('active',s==='done');
    el.querySelector('.todo-btn').classList.toggle('active',s==='todo');
    if(currentFilter!=='all'&&!(currentFilter==='none'&&!s)&&s!==currentFilter) el.classList.add('hidden');
  }
  updateStats(); renderNav();
}
function addDynamic(ftId){
  const input=document.getElementById('ft-'+ftId);
  if(!input||!input.value.trim()) return;
  if(!dynamicItems[ftId]) dynamicItems[ftId]=[];
  dynamicItems[ftId].push({id:ftId+'_'+Date.now(),label:input.value.trim()});
  input.value='';
  saveState(); renderContent(); updateStats(); renderNav();
}
function removeDynamic(ftId,uid){
  dynamicItems[ftId]=(dynamicItems[ftId]||[]).filter(d=>d.id!==uid);
  delete state[uid];
  saveState(); renderContent(); updateStats(); renderNav();
}
function setFilter(filter,btn){
  currentFilter=filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active-all','active-done','active-todo'));
  if(filter==='all') btn.classList.add('active-all');
  else if(filter==='done') btn.classList.add('active-done');
  else if(filter==='todo') btn.classList.add('active-todo');
  renderContent();
}

// ===================== STATS =====================
function updateStats(){
  const all=allFlatItems();
  const done=all.filter(i=>state[i.id]==='done').length;
  const todo=all.filter(i=>state[i.id]==='todo').length;
  const checked=done+todo;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-todo').textContent=todo;
  const pD=checked?Math.round(done/checked*100):0;
  const pT=checked?Math.round(todo/checked*100):0;
  document.getElementById('progress-done').style.width=pD+'%';
  document.getElementById('progress-todo').style.width=pT+'%';
  document.getElementById('progress-todo').style.left=pD+'%';
  document.getElementById('pct-done').textContent=checked?`${done} accomplis`:'—';
  document.getElementById('pct-todo').textContent=checked?`${todo} à faire`:'—';
  renderNav();
}

// ===================== SCROLL SPY =====================
function setupScrollSpy(){
  const content=document.getElementById('content');
  if(!content) return;
  content.onscroll=()=>{
    const st=content.scrollTop;
    let cur=categories[0].id;
    categories.forEach(cat=>{
      const el=document.getElementById('cat-'+cat.id);
      if(el&&el.offsetTop-60<=st) cur=cat.id;
    });
    if(activeCatId!==cur){activeCatId=cur;renderNav();}
  };
}

// ===================== RESULTS =====================
function openResults(){
  document.getElementById('results-panel').classList.add('open');
  const all=allFlatItems();
  const doneItems=all.filter(i=>state[i.id]==='done');
  const todoItems=all.filter(i=>state[i.id]==='todo');
  const checked=doneItems.length+todoItems.length;
  const pct=checked?Math.round(doneItems.length/checked*100):0;

  document.getElementById('results-stats').innerHTML=`
    <div class="r-stat done-s"><div class="r-stat-n">${doneItems.length}</div><div class="r-stat-d">accomplis</div></div>
    <div class="r-stat todo-s"><div class="r-stat-n">${todoItems.length}</div><div class="r-stat-d">sur ma liste</div></div>
    <div class="r-stat done-s"><div class="r-stat-n">${pct}%</div><div class="r-stat-d">des éléments cochés</div></div>
  `;

  // Build by-category lists
  function buildCatList(items, colClass){
    return categories.map(cat=>{
      const catItems=items.filter(i=>i.catId===cat.id);
      if(!catItems.length) return '';
      return `<div class="res-cat-block open">
        <div class="res-cat-toggle" onclick="this.parentElement.classList.toggle('open')">
          <span class="res-cat-name">${cat[lang]}</span>
          <span style="display:flex;align-items:center;gap:8px">
            <span class="res-cat-count">${catItems.length}</span>
            <span class="res-cat-arrow">▼</span>
          </span>
        </div>
        <div class="res-cat-items ${colClass}">
          ${catItems.map(i=>`<div class="res-item">${i.prefix?i.prefix+' ':''}${i.label}</div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('results-lists').innerHTML=`
    <div class="res-list-col">
      <div class="res-col-title done-t">${t('what_done')}</div>
      ${buildCatList(doneItems,'done-col')||`<div style="color:var(--text-dim);font-size:13px">—</div>`}
    </div>
    <div class="res-list-col">
      <div class="res-col-title todo-t">${t('what_todo')}</div>
      ${buildCatList(todoItems,'todo-col')||`<div style="color:var(--text-dim);font-size:13px">—</div>`}
    </div>
  `;
}

function closeResults(){document.getElementById('results-panel').classList.remove('open');}

// ===================== POSTER =====================
let posterPortrait=true;

function openPoster(){
  document.getElementById('poster-panel').classList.add('open');
  drawPoster();
}
function closePoster(){document.getElementById('poster-panel').classList.remove('open');}
function toggleOrientation(){posterPortrait=!posterPortrait;drawPoster();}

function drawPoster(){
  const canvas=document.getElementById('poster-canvas');
  // A2 at 150dpi: 2480×3508 portrait
  const W=posterPortrait?2480:3508;
  const H=posterPortrait?3508:2480;
  canvas.width=W; canvas.height=H;

  const ctx=canvas.getContext('2d');

  // Colors
  const BG='#F5F0E8';
  const CREAM='#FDFAF4';
  const BORDER='#D8D0C0';
  const TEXT='#1C1810';
  const MUTED='#7A7060';
  const DIM='#B8AE9A';
  const GREEN='#2D5016';
  const TERRA='#C4622D';

  // Background
  ctx.fillStyle=BG;
  ctx.fillRect(0,0,W,H);

  const PAD=120;
  const colW=(W-PAD*2-60)/2;

  // Header
  ctx.fillStyle=TEXT;
  ctx.font=`italic ${posterPortrait?110:90}px 'Georgia', serif`;
  ctx.fillText('Bucket List',PAD,PAD+80);

  // Date + total
  const all=allFlatItems();
  const doneItems=all.filter(i=>state[i.id]==='done');
  const todoItems=all.filter(i=>state[i.id]==='todo');
  const dateStr=new Date().toLocaleDateString(lang==='fr'?'fr-CA':'en-CA',{year:'numeric',month:'long',day:'numeric'});
  const total=doneItems.length+todoItems.length;

  ctx.fillStyle=MUTED;
  ctx.font=`${posterPortrait?36:30}px 'DM Sans', sans-serif`;
  ctx.fillText(`${dateStr}   ·   ${total} élément${total>1?'s':''} coché${total>1?'s':''}`,PAD,PAD+130);

  // Separator line
  ctx.strokeStyle=BORDER;
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(PAD,PAD+160);ctx.lineTo(W-PAD,PAD+160);ctx.stroke();

  // Two columns
  const COL_START_Y=PAD+200;
  const FS=posterPortrait?26:22; // font size items
  const FScat=posterPortrait?30:26;
  const lineH=FS*1.65;
  const catH=FScat*2.2;
  const cbSize=FS*0.75;

  function drawCol(items, x, color, title){
    // Column title
    ctx.fillStyle=color;
    ctx.font=`italic ${posterPortrait?52:44}px 'Georgia', serif`;
    ctx.fillText(title,x,COL_START_Y);

    let y=COL_START_Y+catH;

    // Group by category
    categories.forEach(cat=>{
      const catItems=items.filter(i=>i.catId===cat.id);
      if(!catItems.length) return;

      // Category label
      ctx.fillStyle=MUTED;
      ctx.font=`500 ${FScat*0.72}px 'DM Sans', sans-serif`;
      const catLabel=cat[lang].toUpperCase();
      ctx.fillText(catLabel,x,y);

      // Thin line under cat
      ctx.strokeStyle=BORDER;
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x,y+8);ctx.lineTo(x+colW,y+8);ctx.stroke();
      y+=catH*0.85;

      catItems.forEach(item=>{
        if(y>H-PAD-lineH) return; // clip if too long
        const label=item.prefix?item.prefix+' '+item.label:item.label;

        // Checkbox
        const cb=cbSize;
        const cbY=y-cb*0.78;
        ctx.strokeStyle=color;
        ctx.lineWidth=1.5;
        ctx.strokeRect(x,cbY,cb,cb);

        // Checkmark if done
        if(color===GREEN){
          ctx.strokeStyle=GREEN;
          ctx.lineWidth=2;
          ctx.beginPath();
          ctx.moveTo(x+cb*0.18,cbY+cb*0.5);
          ctx.lineTo(x+cb*0.42,cbY+cb*0.78);
          ctx.lineTo(x+cb*0.82,cbY+cb*0.22);
          ctx.stroke();
          ctx.fillStyle=TEXT;
        } else {
          ctx.fillStyle=MUTED;
        }

        // Wrap text
        ctx.font=`${FS}px 'DM Sans', sans-serif`;
        const textX=x+cb+14;
        const maxW=colW-cb-14;
        const words=label.split(' ');
        let line='';
        let firstLine=true;
        words.forEach((word,wi)=>{
          const test=line+word+(wi<words.length-1?' ':'');
          if(ctx.measureText(test).width>maxW&&line!==''){
            ctx.fillText(line,textX,y);
            line=word+' ';
            y+=lineH*0.85;
            firstLine=false;
          } else { line=test; }
        });
        ctx.fillText(line,textX,y);
        y+=lineH;
      });
      y+=lineH*0.3; // space between categories
    });
  }

  drawCol(doneItems, PAD, GREEN, t('poster_done'));
  drawCol(todoItems, PAD+colW+60, TERRA, t('poster_todo'));

  // Footer
  ctx.fillStyle=DIM;
  ctx.font=`${posterPortrait?28:24}px 'DM Sans', sans-serif`;
  ctx.fillText('studioexistence.com/bucket-list',PAD,H-PAD+30);
}

function downloadPoster(){
  const canvas=document.getElementById('poster-canvas');
  const link=document.createElement('a');
  link.download='bucket-list.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
}

loadFromUrl();
loadState();
renderContent();
renderNav();
updateStats();
setLang(lang);
window.addEventListener('resize',layout);
